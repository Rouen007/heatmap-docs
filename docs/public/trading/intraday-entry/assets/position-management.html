<div id="position-management" style="width:100%;color:var(--foreground,#1e293b)">
  <svg viewBox="0 0 1000 470" role="img" aria-labelledby="pm-title pm-desc" style="display:block;width:100%;height:auto">
    <title id="pm-title">持仓后的三种价格路径</title>
    <desc id="pm-desc">左图价格产生位移并形成更高低点，可以继续持有并上移止损；中图价格在入场位附近横盘，出现时间失效，应减仓或退出；右图收盘跌破结构并继续走弱，应退出。</desc>
    <g transform="translate(20 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">A. 正常持仓：有位移</text>
      <rect x="0" y="18" width="300" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1"><line x1="22" y1="75" x2="278" y2="75"/><line x1="22" y1="145" x2="278" y2="145"/><line x1="22" y1="215" x2="278" y2="215"/><line x1="22" y1="285" x2="278" y2="285"/><line x1="22" y1="355" x2="278" y2="355"/></g>
      <line x1="22" y1="245" x2="278" y2="245" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="236" font-size="11">入场/触发位</text>
      <line x1="22" y1="320" x2="278" y2="320" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 4"/><text x="270" y="314" text-anchor="end" font-size="11">初始止损</text>
      <g stroke-linecap="round">
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="55" y1="210" x2="55" y2="300" stroke-width="3"/><rect x="46" y="230" width="18" height="45" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="95" y1="240" x2="95" y2="305" stroke-width="3"/><rect x="86" y="250" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="135" y1="165" x2="135" y2="250" stroke-width="3"/><rect x="126" y="180" width="18" height="55" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="175" y1="205" x2="175" y2="260" stroke-width="3"/><rect x="166" y="215" width="18" height="28" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="215" y1="115" x2="215" y2="220" stroke-width="3"/><rect x="206" y="135" width="18" height="62" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="255" y1="65" x2="255" y2="150" stroke-width="3"/><rect x="246" y="85" width="18" height="45" rx="2"/></g>
      </g>
      <line x1="155" y1="218" x2="205" y2="218" stroke="var(--viz-series-1,#2563eb)" stroke-width="2"/><text x="150" y="205" text-anchor="middle" font-size="11">新高低点</text>
      <line x1="175" y1="320" x2="175" y2="275" stroke="var(--viz-series-2,#16a34a)" stroke-width="2" stroke-dasharray="4 4"/><text x="185" y="290" font-size="11">止损可上移</text>
      <text x="150" y="390" text-anchor="middle" font-size="13" fill="var(--viz-series-2,#16a34a)">持有，分批止盈，不急着全平</text>
    </g>

    <g transform="translate(345 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">B. 时间失效：没有位移</text>
      <rect x="0" y="18" width="300" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1"><line x1="22" y1="75" x2="278" y2="75"/><line x1="22" y1="145" x2="278" y2="145"/><line x1="22" y1="215" x2="278" y2="215"/><line x1="22" y1="285" x2="278" y2="285"/><line x1="22" y1="355" x2="278" y2="355"/></g>
      <line x1="22" y1="245" x2="278" y2="245" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="236" font-size="11">入场/触发位</text>
      <g stroke-linecap="round">
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="55" y1="215" x2="55" y2="275" stroke-width="3"/><rect x="46" y="230" width="18" height="28" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="95" y1="220" x2="95" y2="280" stroke-width="3"/><rect x="86" y="245" width="18" height="25" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="135" y1="225" x2="135" y2="275" stroke-width="3"/><rect x="126" y="240" width="18" height="22" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="175" y1="220" x2="175" y2="282" stroke-width="3"/><rect x="166" y="243" width="18" height="25" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="215" y1="230" x2="215" y2="275" stroke-width="3"/><rect x="206" y="242" width="18" height="20" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="255" y1="220" x2="255" y2="285" stroke-width="3"/><rect x="246" y="247" width="18" height="23" rx="2"/></g>
      </g>
      <path d="M50 250 L95 257 L135 251 L175 255 L215 252 L260 260" fill="none" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="150" y="325" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">2—4根1分钟K仍无位移</text>
      <text x="150" y="355" text-anchor="middle" font-size="13">减仓或退出，释放风险</text>
      <text x="150" y="390" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">不要因为没止损就继续耗着</text>
    </g>

    <g transform="translate(670 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">C. 结构失效：退出</text>
      <rect x="0" y="18" width="300" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1"><line x1="22" y1="75" x2="278" y2="75"/><line x1="22" y1="145" x2="278" y2="145"/><line x1="22" y1="215" x2="278" y2="215"/><line x1="22" y1="285" x2="278" y2="285"/><line x1="22" y1="355" x2="278" y2="355"/></g>
      <line x1="22" y1="245" x2="278" y2="245" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="236" font-size="11">入场/结构边界</text>
      <g stroke-linecap="round">
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="55" y1="270" x2="55" y2="340" stroke-width="3"/><rect x="46" y="285" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="95" y1="220" x2="95" y2="290" stroke-width="3"/><rect x="86" y="235" width="18" height="38" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="135" y1="210" x2="135" y2="300" stroke-width="3"/><rect x="126" y="225" width="18" height="55" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="175" y1="260" x2="175" y2="315" stroke-width="3"/><rect x="166" y="270" width="18" height="28" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="215" y1="275" x2="215" y2="350" stroke-width="3"/><rect x="206" y="290" width="18" height="42" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="255" y1="320" x2="255" y2="385" stroke-width="3"/><rect x="246" y="335" width="18" height="32" rx="2"/></g>
      </g>
      <line x1="115" y1="245" x2="148" y2="245" stroke="var(--destructive,#dc2626)" stroke-width="3"/><text x="150" y="205" text-anchor="middle" font-size="12" fill="var(--destructive,#dc2626)">实体收盘跌破</text>
      <text x="150" y="350" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">不等最远止损，主动退出</text>
      <text x="150" y="390" text-anchor="middle" font-size="13">等待下一次结构</text>
    </g>
  </svg>
</div>
