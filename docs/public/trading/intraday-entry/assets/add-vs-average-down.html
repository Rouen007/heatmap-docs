      <line x1="178" y1="169" x2="278" y2="140" stroke="currentColor" stroke-width="2" stroke-dasharray="5 5" opacity=".55"/>

      <circle cx="328" cy="88" r="15" fill="var(--viz-series-2,#16a34a)"/><text x="328" y="93" text-anchor="middle" font-size="12" fill="var(--primary-foreground,#fff)">加</text>

      <line x1="328" y1="147" x2="328" y2="236" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 5"/>

      <text x="228" y="352" text-anchor="middle" font-size="14" fill="var(--viz-series-2,#16a34a)">总风险仍然可计算</text>

        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="378" y1="340" x2="378" y2="368" stroke-width="3"/><rect x="368" y="346" width="20" height="18" rx="2"/></g>
      </g>
      <line x1="178" y1="339" x2="278" y2="335" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 5"/>
      <line x1="278" y1="335" x2="378" y2="364" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 5"/>
      <circle cx="128" cy="198" r="15" fill="var(--destructive,#dc2626)"/><text x="128" y="203" text-anchor="middle" font-size="12" fill="var(--primary-foreground,#fff)">买</text>
      <text x="102" y="175" font-size="12">第一次买入</text>
      <circle cx="228" cy="286" r="15" fill="var(--destructive,#dc2626)"/><text x="228" y="291" text-anchor="middle" font-size="12" fill="var(--primary-foreground,#fff)">补</text>
      <text x="195" y="265" font-size="12">觉得便宜就补</text>
      <circle cx="328" cy="318" r="15" fill="var(--destructive,#dc2626)"/><text x="328" y="323" text-anchor="middle" font-size="12" fill="var(--primary-foreground,#fff)">补</text>
      <text x="300" y="292" font-size="12">继续补仓</text>
      <line x1="278" y1="335" x2="278" y2="245" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="288" y="244" font-size="11">原结构已失效</text>
      <text x="228" y="352" text-anchor="middle" font-size="14" fill="var(--destructive,#dc2626)">总风险随价格下跌而扩大</text>
    </g>
  </svg>
</div>
