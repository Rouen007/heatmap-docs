<div id="partial-trailing" style="width:100%;color:var(--foreground,#1e293b)">
  <svg viewBox="0 0 1000 470" role="img" aria-labelledby="pt-title pt-desc" style="display:block;width:100%;height:auto">
    <title id="pt-title">分批止盈与剩余仓位管理</title>
    <desc id="pt-desc">左图到达第一个目标后先减仓，形成更高低点后上移剩余仓位止损；中图小幅浮盈就全部平仓；右图不减仓且不移动止损，利润回吐后变成亏损。</desc>
    <g transform="translate(20 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">A. 合理：先减仓，再留尾仓</text>

      <line x1="22" y1="250" x2="278" y2="250" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="241" font-size="11">入场</text>
      <line x1="22" y1="165" x2="278" y2="165" stroke="var(--viz-series-2,#16a34a)" stroke-width="2" stroke-dasharray="6 4"/><text x="270" y="157" text-anchor="end" font-size="11">目标1：减仓</text>
      <line x1="22" y1="305" x2="278" y2="305" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 4"/><text x="270" y="298" text-anchor="end" font-size="11">初始止损</text>
      <g stroke-linecap="round">
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="55" y1="230" x2="55" y2="300" stroke-width="3"/><rect x="46" y="245" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="95" y1="210" x2="95" y2="270" stroke-width="3"/><rect x="86" y="220" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="135" y1="135" x2="135" y2="225" stroke-width="3"/><rect x="126" y="150" width="18" height="55" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="175" y1="160" x2="175" y2="220" stroke-width="3"/><rect x="166" y="170" width="18" height="28" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="215" y1="95" x2="215" y2="175" stroke-width="3"/><rect x="206" y="110" width="18" height="45" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="255" y1="55" x2="255" y2="125" stroke-width="3"/><rect x="246" y="75" width="18" height="38" rx="2"/></g>
      </g>
      <circle cx="135" cy="165" r="11" fill="var(--viz-series-2,#16a34a)"/><text x="135" y="169" text-anchor="middle" font-size="10" fill="var(--primary-foreground,#fff)">减</text>
      <line x1="175" y1="305" x2="175" y2="225" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="4 4"/><text x="184" y="260" font-size="11">新结构后上移</text>
      <text x="150" y="370" text-anchor="middle" font-size="13" fill="var(--viz-series-2,#16a34a)">先兑现一部分，保留趋势收益</text>
      <text x="150" y="392" text-anchor="middle" font-size="13">剩余仓位等结构退出</text>
    </g>

    <g transform="translate(345 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">B. 过早：小浮盈就全平</text>
      <rect x="0" y="18" width="300" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1"><line x1="22" y1="75" x2="278" y2="75"/><line x1="22" y1="145" x2="278" y2="145"/><line x1="22" y1="215" x2="278" y2="215"/><line x1="22" y1="285" x2="278" y2="285"/><line x1="22" y1="355" x2="278" y2="355"/></g>
      <line x1="22" y1="250" x2="278" y2="250" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="241" font-size="11">入场</text>
      <line x1="22" y1="215" x2="278" y2="215" stroke="var(--viz-series-2,#16a34a)" stroke-width="2" stroke-dasharray="6 4"/><text x="270" y="207" text-anchor="end" font-size="11">小浮盈</text>
      <g stroke-linecap="round">
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="55" y1="230" x2="55" y2="300" stroke-width="3"/><rect x="46" y="245" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="95" y1="185" x2="95" y2="260" stroke-width="3"/><rect x="86" y="205" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="135" y1="150" x2="135" y2="225" stroke-width="3"/><rect x="126" y="170" width="18" height="38" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="175" y1="105" x2="175" y2="180" stroke-width="3"/><rect x="166" y="125" width="18" height="38" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="215" y1="65" x2="215" y2="130" stroke-width="3"/><rect x="206" y="85" width="18" height="35" rx="2"/></g>
      </g>
      <circle cx="95" cy="215" r="12" fill="var(--viz-series-1,#2563eb)"/><text x="95" y="219" text-anchor="middle" font-size="10" fill="var(--primary-foreground,#fff)">平</text>
      <path d="M110 200 C145 150 175 115 220 75" fill="none" stroke="var(--viz-series-2,#16a34a)" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="150" y="330" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">方向判断正确，但利润被放弃</text>
      <text x="150" y="370" text-anchor="middle" font-size="13">全平可以是计划</text>
      <text x="150" y="392" text-anchor="middle" font-size="13">但不能只是因为害怕回撤</text>
    </g>

    <g transform="translate(670 28)">
      <text x="150" y="0" text-anchor="middle" font-size="17" font-weight="500">C. 过晚：浮盈回吐成亏损</text>
      <rect x="0" y="18" width="300" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1"><line x1="22" y1="75" x2="278" y2="75"/><line x1="22" y1="145" x2="278" y2="145"/><line x1="22" y1="215" x2="278" y2="215"/><line x1="22" y1="285" x2="278" y2="285"/><line x1="22" y1="355" x2="278" y2="355"/></g>
      <line x1="22" y1="250" x2="278" y2="250" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="7 5"/><text x="30" y="241" font-size="11">入场</text>
      <line x1="22" y1="305" x2="278" y2="305" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="6 4"/><text x="270" y="298" text-anchor="end" font-size="11">原始止损</text>
      <g stroke-linecap="round">
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="55" y1="230" x2="55" y2="300" stroke-width="3"/><rect x="46" y="245" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="95" y1="185" x2="95" y2="260" stroke-width="3"/><rect x="86" y="205" width="18" height="35" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="135" y1="145" x2="135" y2="220" stroke-width="3"/><rect x="126" y="165" width="18" height="38" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="175" y1="175" x2="175" y2="280" stroke-width="3"/><rect x="166" y="195" width="18" height="58" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="215" y1="235" x2="215" y2="320" stroke-width="3"/><rect x="206" y="250" width="18" height="45" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="255" y1="285" x2="255" y2="365" stroke-width="3"/><rect x="246" y="305" width="18" height="42" rx="2"/></g>
      </g>
      <line x1="22" y1="250" x2="278" y2="250" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="4 4"/><text x="150" y="275" text-anchor="middle" font-size="12">没有减仓，也没有管理止损</text>
      <text x="150" y="350" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">浮盈回吐，最后按原风险退出</text>
      <text x="150" y="390" text-anchor="middle" font-size="13">利润管理也是风险管理</text>
    </g>
  </svg>
</div>
